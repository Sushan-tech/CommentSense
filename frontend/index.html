<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CommentSense Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">
        <h1>CommentSense</h1>
        <p class="subtitle">
            API-based Comment Moderation & Chat Segregation Demo
        </p>

        <textarea id="commentInput" placeholder="Type a comment here..."></textarea>

        <button id="analyzeBtn">Analyze Comment</button>

        <div id="result" class="result hidden">
            <h3>Analysis Result</h3>
            <pre id="resultContent"></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
